name: tasbeeh_app
description: Tasbeeh & Athkar & Prayer times app (MVP)
publish_to: "none"

version: 1.1.0+4

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:

  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.0
  flutter_timezone: ^5.0.1

  flutter_localizations:
    sdk: flutter
  flutter_compass: ^0.8.0  

  flutter_riverpod: ^3.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1

  # لازم يتوافق مع flutter_localizations في Flutter 3.38.3
  intl: ^0.20.2

  hijri: ^3.0.0
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  adhan: ^2.0.0+1
  
  audioplayers: ^6.1.0
  scrollable_positioned_list: ^0.3.8
  quran: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21



flutter:
  uses-material-design: true
  assets:
    - assets/quran/quran.json
    - assets/audio/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700